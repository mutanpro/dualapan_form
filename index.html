<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dualapahan Photography - Booking Form</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1c2327 0%, #0f1215 100%);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Pernak-pernik: Efek glow emas di sekitar form */
        .container {
            background: rgba(22, 28, 32, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.05), 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 460px;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi garis emas tipis di bagian atas kartu */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #aa841e, #d4af37, #aa841e);
        }

        .header-zone {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Pernak-pernik: Ikon kamera estetik di atas judul */
        .header-icon {
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 12px;
            opacity: 0.8;
            animation: pulse 2s infinite alternate;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 9px;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* Pernak-pernik: Menambahkan ikon di dalam input box jika diinginkan, 
           namun untuk kesederhanaan kita buat input yang super clean & modern */
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 18, 21, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(50%) saturate(1000%) hue-rotate(5deg);
            opacity: 0.7;
            cursor: pointer;
        }

        .select-wrapper {
            position: relative;
        }
        
        /* Panah dropdown kustom yang lebih manis */
        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 14px;
            color: #d4af37;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus,
        select:focus {
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
            background: rgba(15, 18, 21, 0.9);
        }

        select option {
            background: #161c20;
            color: #ffffff;
        }

        /* Pernak-pernik: Tombol interaktif dengan ikon WA */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b38f24 100%);
            color: #0f1215;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
            background: linear-gradient(135deg, #e5c158 0%, #c49a2b 100%);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            margin-top: 30px;
        }

        .footer-text a {
            color: #d4af37;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .footer-text a:hover {
            color: #e5c158;
            text-decoration: underline;
        }

        /* Animasi nafas untuk ikon kamera */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-zone">
        <div class="header-icon"><i class="fa-solid fa-camera-retro"></i></div>
        <h2>Dualapahan Photography</h2>
        <p class="subtitle">Reservation Form</p>
    </div>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="nama">Nama Client *</label>
            <input type="text" id="nama" required placeholder="Nama lengkap Anda">
        </div>

        <div class="form-group">
            <label for="acara">Jenis Acara *</label>
            <div class="select-wrapper">
                <select id="acara" required>
                    <option value="" disabled selected>Pilih kategori event</option>
                    <option value="Wedding">Wedding (Pernikahan)</option>
                    <option value="Prewedding">Prewedding</option>
                    <option value="Engagement">Engagement (Tunangan)</option>
                    <option value="Wisuda / Graduation">Wisuda / Graduation</option>
                    <option value="Event / Birthday">Event / Birthday Party</option>
                    <option value="Studio Session">Studio Session</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="lokasi">Lokasi Acara *</label>
            <input type="text" id="lokasi" required placeholder="Contoh: Gedung / Rumah / Kota">
        </div>

        <div class="form-group">
            <label for="tanggal">Tanggal Acara *</label>
            <input type="date" id="tanggal" required>
        </div>

        <button type="submit">
            <i class="fa-brands fa-whatsapp" style="font-size: 18px;"></i> 
            Check Availability
        </button>
    </form>

    <div class="footer-text">
        © 2026 Dualapahan Photography. Connect via <a href="https://www.instagram.com/dualapan__photography/" target="_blank"><i class="fa-brands fa-instagram"></i> @dualapan__photography</a>
    </div>
</div>

<script>
    // OTOMATISASI TANGGAL SEKARANG
    window.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('tanggal');
        const today = new Date();
        
        // Format YYYY-MM-DD agar bisa dibaca oleh input type="date"
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        
        dateInput.value = `${year}-${month}-${day}`;
    });

    // KIRIM DATA KE WHATSAPP
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Nomor WA kamu otomatis terpasang
        const nomorWA = "6285726797198"; 

        const nama = document.getElementById('nama').value;
        const acara = document.getElementById('acara').value;
        const lokasi = document.getElementById('lokasi').value;
        const tanggal = document.getElementById('tanggal').value;

        // Merapikan tanggal dari YYYY-MM-DD ke DD/MM/YYYY saat dikirim di WA
        const dateObj = new Date(tanggal);
        const formattedDate = !isNaN(dateObj) 
            ? `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`
            : tanggal;

        // Template Pesan WA yang rapi dan elegan
        const pesan = `Halo *Dualapahan Photography*,%0Asaya ingin menanyakan ketersediaan jadwal untuk booking slot:%0A%0A` +
                      `✨ *Detail Client* ✨%0A` +
                      `• *Nama:* ${nama}%0A` +
                      `• *Acara:* ${acara}%0A` +
                      `• *Lokasi:* ${lokasi}%0A` +
                      `• *Tanggal:* ${formattedDate}%0A%0A` +
                      `Apakah slot pada tanggal tersebut masih tersedia? Terima kasih!`;

        const urlWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`;
        window.open(urlWA, '_blank');
    });
</script>

</body>
</html>
