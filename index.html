<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dualapan__photography - Booking Form</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=1920'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(10, 12, 15, 0.7); 
            z-index: 1;
        }

        .container {
            background: rgba(22, 28, 32, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.08), 0 25px 60px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 2;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #aa841e, #d4af37, #aa841e);
        }

        .header-zone {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            color: #d4af37;
            font-size: 26px;
            margin-bottom: 12px;
            opacity: 0.9;
            animation: pulse 2s infinite alternate;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 18, 21, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
            display: block;
            -webkit-appearance: none;
            appearance: none;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        input[type="date"] {
            height: 48px; 
            line-height: 1.5;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23d4af37" viewBox="0 0 16 16"><path d="M11 6.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1z"/><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            width: 20px;
            height: 20px;
        }

        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 14px;
            color: #d4af37;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.25);
            background: rgba(15, 18, 21, 0.9);
        }

        select option {
            background: #161c20;
            color: #ffffff;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #b38f24 100%);
            color: #0f1215;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #e5c158 0%, #c49a2b 100%);
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            margin-top: 25px;
        }

        .footer-text a {
            color: #d4af37;
            text-decoration: none;
        }
        
        .footer-text a:hover {
            color: #e5c158;
            text-decoration: underline;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-zone">
        <div class="header-icon"><i class="fa-solid fa-camera-retro"></i></div>
        <h2>Dualapan__photography</h2>
        <p class="subtitle">Reservation Form</p>
    </div>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="nama">Nama Client *</label>
            <input type="text" id="nama" required placeholder="Nama lengkap Anda">
        </div>

        <div class="form-group">
            <label for="acara">Jenis Acara *</label>
            <div class="select-wrapper">
                <select id="acara" required>
                    <option value="" disabled selected>Pilih kategori event</option>
                    <option value="Wedding">Wedding (Pernikahan)</option>
                    <option value="Prewedding">Prewedding</option>
                    <option value="Engagement">Engagement (Tunangan)</option>
                    <option value="Wisuda / Graduation">Wisuda / Graduation</option>
                    <option value="Event / Birthday">Event / Birthday Party</option>
                    <option value="Studio Session">Studio Session</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="lokasi">Lokasi Acara *</label>
            <input type="text" id="lokasi" required placeholder="Contoh: Gedung / Rumah / Kota">
        </div>

        <div class="form-group">
            <label for="tanggal">Tanggal Acara *</label>
            <input type="date" id="tanggal" required>
        </div>

        <div class="form-group">
            <label for="catatan">Catatan / Request Tambahan (Opsional)</label>
            <textarea id="catatan" placeholder="Tulis detail tambahan seperti konsep foto, jam acara, dll jika ada..."></textarea>
        </div>

        <button type="submit">
            <i class="fa-brands fa-whatsapp" style="font-size: 18px;"></i> 
            Check Availability
        </button>
    </form>

    <div class="footer-text">
        © 2026 Dualapan__photography. Connect via <a href="https://www.instagram.com/dualapan__photography/" target="_blank"><i class="fa-brands fa-instagram"></i> @dualapan__photography</a>
    </div>
</div>

<script>
    // OTOMATIS TANGGAL HARI INI
    window.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('tanggal');
        const today = new Date();
        
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        
        dateInput.value = `${year}-${month}-${day}`;
    });

    // KIRIM DATA KE WA
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const nomorWA = "6285726797198"; 

        const nama = document.getElementById('nama').value;
        const acara = document.getElementById('acara').value;
        const lokasi = document.getElementById('lokasi').value;
        const tanggal = document.getElementById('tanggal').value;
        const catatan = document.getElementById('catatan').value;

        const dateObj = new Date(tanggal);
        const formattedDate = !isNaN(dateObj) 
            ? `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`
            : tanggal;

        const teksCatatan = catatan.trim() !== "" ? catatan : "-";

        // Template Pesan WhatsApp dengan Nama yang benar
        const pesan = `Halo *Dualapan__photography*,%0Asaya ingin menanyakan ketersediaan jadwal untuk booking slot:%0A%0A` +
                      `✨ *Detail Client* ✨%0A` +
                      `• *Nama:* ${nama}%0A` +
                      `• *Acara:* ${acara}%0A` +
                      `• *Lokasi:* ${lokasi}%0A` +
                      `• *Tanggal:* ${formattedDate}%0A` +
                      `• *Catatan:* ${teksCatatan}%0A%0A` +
                      `Apakah slot pada tanggal tersebut masih tersedia? Terima kasih!`;

        const urlWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`;
        window.open(urlWA, '_blank');
    });
</script>

</body>
</html>
